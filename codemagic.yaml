workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 30
    environment:
      flutter: stable
      android_signing:
        - keystore_reference  # optional — remove these 2 lines if you don't set up signing
      vars:
        PACKAGE_NAME: "com.example.clean_video_player"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build release APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - melihdog@gmail.com   # ← change this to your email
        notify:
          success: true
          failure: true
