name: clean_video_player
description: A clean, minimal looping video player for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.8.6
  chewie: ^1.8.5
  file_picker: ^8.0.7
  shared_preferences: ^2.2.3
  path: ^1.9.0
  path_provider: ^2.1.3
  wakelock_plus: ^1.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
